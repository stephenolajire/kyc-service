services:
  - type: web
    name: kyc-service
    env: python
    plan: starter
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 180 --workers 1 --threads 1 --max-requests 20 --max-requests-jitter 5"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DISABLE_COLLECTSTATIC
        value: "0"
      - key: DEBUG
        value: "False"
      - key: MAX_UPLOAD_BYTES
        value: "4194304"
      - key: MAX_IMAGE_DIMENSION
        value: "1000"
      - key: ID_AUTHENTICITY_MIN_SCORE
        value: "55"
